<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" /> <!-- indigo-600 -->
      <stop offset="50%" stop-color="#2563eb" /> <!-- blue-600 -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- cyan-500 -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)" />
  
  <!-- PDF Document Icon with shadow -->
  <g filter="url(#shadow)">
    <!-- Base Paper -->
    <path d="M160 110 h120 l80 80 v200 a32 32 0 0 1 -32 32 h-168 a32 32 0 0 1 -32 -32 v-248 a32 32 0 0 1 32 -32 z" fill="#ffffff" />
    
    <!-- Folded Corner -->
    <path d="M280 110 v48 a32 32 0 0 0 32 32 h48 z" fill="#e2e8f0" />
    
    <!-- Stylized Content Lines -->
    <rect x="180" y="240" width="150" height="24" rx="12" fill="#cbd5e1" />
    <rect x="180" y="296" width="100" height="24" rx="12" fill="#cbd5e1" />
    <rect x="180" y="352" width="120" height="24" rx="12" fill="#cbd5e1" />
  </g>
</svg>
